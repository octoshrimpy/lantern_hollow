<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1c2c" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="src/css/app.css" />
  <title>Lantern Hollow Mobile</title>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <label for="seedInput">Seed</label>
      <input id="seedInput" type="text" value="lantern-hollow" />
      <span>Last input: <strong id="lastInput">ready</strong></span>
    </div>
    <pre id="screen" class="screen" aria-live="polite"></pre>
    <section class="controls">
      <div id="swipePad" class="swipe-pad" aria-label="Swipe to move, hold to repeat">Swipe to move</div>
      <div class="ab">
        <button id="btnB" class="action" type="button">B / Esc</button>
        <button id="btnA" class="action" type="button">A / Enter</button>
      </div>
    </section>
  </main>
  <script type="module" src="src/js/main.js"></script>
</body>
</html>
